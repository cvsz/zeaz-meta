apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zeaz-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cvsz/zeaz-meta.git
    targetRevision: main
    path: platform/deploy/kubernetes/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: zeaz-platform
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true", "ServerSideApply=true"]
