apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: zeaz-vault
spec:
  provider:
    vault:
      server: https://vault.vault.svc.cluster.local:8200
      path: zeaz
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: zeaz-platform
          serviceAccountRef:
            name: zeaz-service
            namespace: zeaz-platform
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zeaz-provider-webhook-secrets
  namespace: zeaz-platform
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: zeaz-vault
    kind: ClusterSecretStore
  target:
    name: zeaz-provider-webhook-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: line-channel-secret
      remoteRef:
        key: providers/line
        property: channel_secret
    - secretKey: tiktok-webhook-secret
      remoteRef:
        key: providers/tiktok
        property: webhook_secret
