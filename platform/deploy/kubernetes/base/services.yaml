apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeaz-service
  namespace: zeaz-platform
  annotations:
    spiffe.io/spiffe-id: spiffe://zeaz.dev/ns/zeaz-platform/sa/zeaz-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zeaz-service-config
  namespace: zeaz-platform
data:
  HTTP_ADDR: ":8080"
  NATS_URL: nats://nats.nats.svc.cluster.local:4222
  VAULT_ADDR: https://vault.vault.svc.cluster.local:8200
  POSTGRES_HOST: postgres-rw.data.svc.cluster.local
  REDIS_ADDR: redis-master.data.svc.cluster.local:6379
  TENANT_MODE: strict
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc:4318
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeaz-default-deny
  namespace: zeaz-platform
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: zeaz-allow-mesh-egress
  namespace: zeaz-platform
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: istio-system}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: vault}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: nats}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: data}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: observability}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: zeaz-platform
  labels: {app.kubernetes.io/name: wallet-service, app.kubernetes.io/component: wallet-service}
spec:
  replicas: 5
  selector: {matchLabels: {app.kubernetes.io/name: wallet-service}}
  template:
    metadata:
      labels: {app.kubernetes.io/name: wallet-service, app.kubernetes.io/component: wallet-service}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "8080"}
    spec:
      serviceAccountName: zeaz-service
      securityContext: {seccompProfile: {type: RuntimeDefault}, runAsNonRoot: true}
      containers:
        - name: app
          image: ghcr.io/cvsz/zeaz-meta/wallet-service:main
          ports: [{containerPort: 8080, name: http}]
          envFrom: [{configMapRef: {name: zeaz-service-config}}]
          env: [{name: SERVICE_NAME, value: wallet-service}]
          readinessProbe: {httpGet: {path: /healthz, port: http}, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: http}, periodSeconds: 20}
          resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: "2", memory: 1Gi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
---
apiVersion: v1
kind: Service
metadata: {name: wallet-service, namespace: zeaz-platform}
spec: {selector: {app.kubernetes.io/name: wallet-service}, ports: [{name: http, port: 8080, targetPort: http}]}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: wallet-service, namespace: zeaz-platform}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: wallet-service}
  minReplicas: 5
  maxReplicas: 40
  metrics: [{type: Resource, resource: {name: cpu, target: {type: Utilization, averageUtilization: 65}}}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: wallet-service, namespace: zeaz-platform}
spec: {minAvailable: 3, selector: {matchLabels: {app.kubernetes.io/name: wallet-service}}}

