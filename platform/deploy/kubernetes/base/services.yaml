apiVersion: v1
kind: ConfigMap
metadata:
  name: zeaz-service-config
  namespace: zeaz-platform
data:
  NATS_URL: nats://nats.nats.svc.cluster.local:4222
  VAULT_ADDR: https://vault.vault.svc.cluster.local:8200
  TENANT_MODE: strict
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeaz-service
  namespace: zeaz-platform
spec:
  replicas: 3
  selector:
    matchLabels: {app.kubernetes.io/name: zeaz-service}
  template:
    metadata:
      labels: {app.kubernetes.io/name: zeaz-service}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: zeaz-service
      securityContext:
        seccompProfile: {type: RuntimeDefault}
        runAsNonRoot: true
      containers:
        - name: app
          image: ghcr.io/cvsz/zeaz-meta/wallet-service:main
          ports: [{containerPort: 8080, name: http}]
          envFrom: [{configMapRef: {name: zeaz-service-config}}]
          env:
            - name: SERVICE_NAME
              valueFrom: {fieldRef: {fieldPath: metadata.labels['app.kubernetes.io/component']}}
          readinessProbe: {httpGet: {path: /healthz, port: http}, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: http}, periodSeconds: 20}
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: "1", memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
---
apiVersion: v1
kind: Service
metadata:
  name: zeaz-service
  namespace: zeaz-platform
spec:
  selector: {app.kubernetes.io/name: zeaz-service}
  ports: [{name: http, port: 8080, targetPort: http}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zeaz-service
  namespace: zeaz-platform
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: zeaz-service}
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 65}
