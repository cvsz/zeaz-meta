global:
  scrape_interval: 15s
scrape_configs:
  - job_name: zeaz-services
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace]
        regex: zeaz-system
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        regex: "8080"
        action: keep
rule_files:
  - /etc/prometheus/zeaz-anomaly-rules.yaml
