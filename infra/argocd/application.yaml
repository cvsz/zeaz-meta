apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zeaz-v19
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zeazdev/zeaz-meta.git
    targetRevision: HEAD
    path: infra/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: zeaz-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions: ["CreateNamespace=true"]
