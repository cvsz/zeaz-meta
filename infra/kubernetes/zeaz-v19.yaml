apiVersion: v1
kind: Namespace
metadata:
  name: zeaz-system
  labels:
    istio-injection: enabled
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zeaz-services
  namespace: zeaz-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: zeaz-v19
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zeaz-services
  namespace: zeaz-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: zeaz-system
spec:
  replicas: 3
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: zeaz-v19
    spec:
      serviceAccountName: zeaz-workload
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: service
          image: ghcr.io/zeazdev/zeaz-meta/api-gateway:sha
          ports: [{ containerPort: 8080 }]
          envFrom: [{ secretRef: { name: zeaz-runtime } }]
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, periodSeconds: 20 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: zeaz-system
spec:
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeaz-wildcard
  namespace: zeaz-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: ["*.zeaz.dev"]
      secretName: zeaz-wildcard-tls
  rules:
    - host: api.zeaz.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port: { number: 80 }
