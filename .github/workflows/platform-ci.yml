name: platform-ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: platform } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: platform/go.mod }
      - run: go test ./...
      - run: go vet ./...
  build-images:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [wallet-service,payment-service,swap-engine,bot-service,affiliate-service,notification-service,auth-service,audit-service,tss-signer]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/deploy/docker/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/cvsz/zeaz-meta/${{ matrix.service }}:${{ github.sha }}
  scan:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
